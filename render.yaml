services:
  - type: web
    name: smart-hire-backend
    env: node
    plan: free
    rootDir: crm-backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push && npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: smart-hire-db
          property: connectionString

databases:
  - name: smart-hire-db
    plan: free
    databaseName: smart_hire_db
    user: smart_hire_user
