<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>लॉगिन | खासदार मुरलीधर मोहोळ रोजगार व स्वयंरोजगार केंद्र</title>
    <link rel="stylesheet" href="css/frontend-modern.css" />
    <link rel="stylesheet" href="css/saas-landing.css" />
    <link rel="stylesheet" href="css/government-branding.css" />
    <link rel="stylesheet" href="css/responsive-system.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/Logo.png">
</head>
<body class="gov-auth-page">
    <div class="gov-auth-container">
        <!-- Header with Logo and Portal Name -->
        <div class="gov-auth-header">
            <a href="index.html" class="gov-auth-brand">
                <img src="images/Logo.png" alt="Portal Logo" class="gov-auth-logo">
                <div class="gov-auth-brand-text">
                    <span class="gov-brand-line1">खासदार मुरलीधर मोहोळ</span>
                    <span class="gov-brand-line2">रोजगार व स्वयंरोजगार केंद्र</span>
                </div>
            </a>
        </div>

        <!-- Auth Card -->
        <div class="gov-auth-card">
            <div class="gov-auth-card-header">
                <h1>Login to Your Account</h1>
                <p>Access the employment portal to find jobs, manage applications, and connect with opportunities.</p>
            </div>

            <form id="loginForm" class="gov-auth-form" novalidate>
                <div class="gov-auth-field">
                    <label for="email">Email Address</label>
                    <input id="email" type="email" placeholder="Enter your email" required />
                </div>

                <div class="gov-auth-field">
                    <label for="password">Password</label>
                    <input id="password" type="password" placeholder="Enter your password" required />
                </div>

                <div id="errorText" class="gov-auth-error"></div>
                <button id="loginBtn" class="gov-auth-btn" type="submit">Login</button>
            </form>

            <div class="gov-auth-footer">
                Don't have an account? <a id="registerLink" href="register.html">Register</a>
            </div>
        </div>

        <!-- Footer Text -->
        <div class="gov-auth-page-footer">
            <p>© 2024 खासदार मुरलीधर मोहोळ रोजगार व स्वयंरोजगार केंद्र. All rights reserved.</p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
    const form = document.getElementById("loginForm");
    const errorText = document.getElementById("errorText");
    const loginBtn = document.getElementById("loginBtn");
    const redirectParam = new URLSearchParams(window.location.search).get("redirect");
    const registerLink = document.getElementById("registerLink");

    if (redirectParam && registerLink) {
        registerLink.href = `register.html?redirect=${encodeURIComponent(redirectParam)}`;
    }

    function getSafeRedirectTarget(value) {
        const raw = String(value || "").trim();
        if (!raw) return "";

        try {
            if (raw.startsWith("/") && !raw.startsWith("//")) {
                return raw;
            }

            const parsed = new URL(raw, window.location.origin);
            if (parsed.origin === window.location.origin) {
                return parsed.href;
            }
        } catch {
            return "";
        }

        return "";
    }

    form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorText.textContent = "";
        errorText.classList.remove('show');

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
            errorText.textContent = "Email and password are required.";
            errorText.classList.add('show');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";

        try {
            const data = await apiFetch("/auth/login", {
                method: "POST",
                body: JSON.stringify({ email, password }),
            });

            console.log("LOGIN RESPONSE:", data);

            const token = data?.data?.token;
            const user = data?.data?.user;

            if (!token || !user) {
                throw new Error("Invalid login response format.");
            }

            localStorage.setItem("token", token);
            localStorage.setItem("user", JSON.stringify(user));

            const safeRedirect = getSafeRedirectTarget(redirectParam);
            window.location.href = safeRedirect || getDashboardForRole(user.role);
        } catch (error) {
            console.error("LOGIN ERROR:", error);
            errorText.textContent = error.message || "Invalid email or password";
            errorText.classList.add('show');
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = "Login";
        }
    });
    </script>
</body>
</html>
