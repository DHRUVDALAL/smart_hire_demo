<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>नोंदणी | खासदार मुरलीधर मोहोळ रोजगार व स्वयंरोजगार केंद्र</title>
    <link rel="stylesheet" href="css/frontend-modern.css" />
    <link rel="stylesheet" href="css/saas-landing.css" />
    <link rel="stylesheet" href="css/government-branding.css" />
    <link rel="stylesheet" href="css/responsive-system.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/Logo.png">
</head>
<body class="gov-auth-page">
    <div class="gov-auth-container">
        <!-- Header with Logo and Portal Name -->
        <div class="gov-auth-header">
            <a href="index.html" class="gov-auth-brand">
                <img src="images/Logo.png" alt="Portal Logo" class="gov-auth-logo">
                <div class="gov-auth-brand-text">
                    <span class="gov-brand-line1">खासदार मुरलीधर मोहोळ</span>
                    <span class="gov-brand-line2">रोजगार व स्वयंरोजगार केंद्र</span>
                </div>
            </a>
        </div>

        <!-- Auth Card -->
        <div class="gov-auth-card gov-auth-card-wide">
            <div class="gov-auth-card-header">
                <h1>Create Your Account</h1>
                <p>Register to access employment opportunities and career services.</p>
            </div>

            <form id="registerForm" class="gov-auth-form" novalidate>
                <div class="gov-auth-field">
                    <label for="name">Full Name</label>
                    <input id="name" type="text" placeholder="Enter your full name" required />
                </div>

                <div class="gov-auth-field">
                    <label for="email">Email Address</label>
                    <input id="email" type="email" placeholder="Enter your email" required />
                </div>

                <div class="gov-auth-field">
                    <label for="role">Role</label>
                    <select id="role" required>
                        <option value="">Select your role</option>
                        <option value="ADMIN">Admin</option>
                        <option value="RECRUITER">Recruiter</option>
                        <option value="APPLICANT">Applicant</option>
                        <option value="EMPLOYEE">Employee</option>
                        <option value="HR">HR</option>
                        <option value="ACCOUNTANT">Accountant</option>
                    </select>
                </div>

                <div class="gov-auth-field-row">
                    <div class="gov-auth-field">
                        <label for="password">Password</label>
                        <input id="password" type="password" placeholder="Min. 6 characters" required />
                    </div>
                    <div class="gov-auth-field">
                        <label for="confirmPassword">Confirm Password</label>
                        <input id="confirmPassword" type="password" placeholder="Re-enter password" required />
                    </div>
                </div>

                <!-- Recruiter Fields -->
                <div id="recruiterFields" class="gov-auth-conditional">
                    <div class="gov-auth-field">
                        <label for="companyName">Company Name <span class="required-mark">*</span></label>
                        <input id="companyName" type="text" placeholder="Enter company name" />
                    </div>
                    <div class="gov-auth-field">
                        <label for="designation">Designation (Optional)</label>
                        <input id="designation" type="text" placeholder="Enter your designation" />
                    </div>
                </div>

                <!-- Employee Fields -->
                <div id="employeeFields" class="gov-auth-conditional">
                    <div class="gov-auth-field">
                        <label for="department">Department (Optional)</label>
                        <input id="department" type="text" placeholder="Enter your department" />
                        <span class="gov-auth-hint">This will be included in your profile.</span>
                    </div>
                </div>

                <div id="errorText" class="gov-auth-error"></div>
                <button id="submitBtn" class="gov-auth-btn" type="submit">Register</button>
            </form>

            <div class="gov-auth-footer">
                Already have an account? <a id="loginLink" href="login.html">Login</a>
            </div>
        </div>

        <!-- Footer Text -->
        <div class="gov-auth-page-footer">
            <p>© 2024 खासदार मुरलीधर मोहोळ रोजगार व स्वयंरोजगार केंद्र. All rights reserved.</p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const roleEl = document.getElementById("role");
        const recruiterFields = document.getElementById("recruiterFields");
        const employeeFields = document.getElementById("employeeFields");
        const companyNameEl = document.getElementById("companyName");
        const designationEl = document.getElementById("designation");
        const departmentEl = document.getElementById("department");
        const errorText = document.getElementById("errorText");
        const submitBtn = document.getElementById("submitBtn");
        const redirectParam = new URLSearchParams(window.location.search).get("redirect");
        const loginLink = document.getElementById("loginLink");
        const REGISTER_ENDPOINT = "https://smart-hire-backend-vq38.onrender.com/api/auth/register";
        const ALLOWED_REGISTER_ROLES = ["ADMIN", "RECRUITER", "APPLICANT", "HR", "EMPLOYEE", "ACCOUNTANT"];

        if (redirectParam && loginLink) {
            loginLink.href = `login.html?redirect=${encodeURIComponent(redirectParam)}`;
        }

        function getSafeRedirectTarget(value) {
            const raw = String(value || "").trim();
            if (!raw) return "";

            try {
                if (raw.startsWith("/") && !raw.startsWith("//")) {
                    return raw;
                }

                const parsed = new URL(raw, window.location.origin);
                if (parsed.origin === window.location.origin) {
                    return parsed.href;
                }
            } catch {
                return "";
            }

            return "";
        }

        function onRoleChange() {
            const role = roleEl.value;
            recruiterFields.classList.toggle('show', role === "RECRUITER");
            employeeFields.classList.toggle('show', role === "EMPLOYEE");
        }

        roleEl.addEventListener("change", onRoleChange);

        document.getElementById("registerForm").addEventListener("submit", async (event) => {
            event.preventDefault();
            errorText.textContent = "";
            errorText.classList.remove('show');

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const role = String(roleEl.value || "").toUpperCase();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (!name || !email || !role || !password || !confirmPassword) {
                errorText.textContent = "Please fill all required fields.";
                errorText.classList.add('show');
                return;
            }

            if (!ALLOWED_REGISTER_ROLES.includes(role)) {
                errorText.textContent = "Please select a valid role.";
                errorText.classList.add('show');
                return;
            }

            if (!/^\S+@\S+\.\S+$/.test(email)) {
                errorText.textContent = "Please enter a valid email.";
                errorText.classList.add('show');
                return;
            }

            if (password.length < 6) {
                errorText.textContent = "Password must be at least 6 characters.";
                errorText.classList.add('show');
                return;
            }

            if (password !== confirmPassword) {
                errorText.textContent = "Password and confirm password must match.";
                errorText.classList.add('show');
                return;
            }

            if (role === "RECRUITER" && !companyNameEl.value.trim()) {
                errorText.textContent = "Company Name is required for recruiter registration.";
                errorText.classList.add('show');
                return;
            }

            const payload = { name, email, password, role };

            if (role === "RECRUITER") {
                payload.companyName = companyNameEl.value.trim();
                payload.designation = designationEl.value.trim() || "";
            }

            if (role === "EMPLOYEE" && departmentEl.value.trim()) {
                payload.department = departmentEl.value.trim();
            }

            console.log("REGISTER PAYLOAD:", {
                name,
                email,
                password,
                role
            });
            console.log("REGISTER URL:", REGISTER_ENDPOINT);

            submitBtn.disabled = true;
            submitBtn.textContent = "Creating account...";

            try {
                const result = await apiFetch(REGISTER_ENDPOINT, {
                    method: "POST",
                    body: JSON.stringify(payload),
                    headers: {
                        "Content-Type": "application/json"
                    }
                });

                console.log("REGISTER RESPONSE:", result);

                const success = result?.success === true;
                const token = result?.data?.token;
                const user = result?.data?.user;
                const responseMessage = result?.message;

                if (!success || !token || !user) {
                    throw new Error(responseMessage || "Registration failed");
                }

                localStorage.setItem("token", token);
                localStorage.setItem("user", JSON.stringify(user));

                const safeRedirect = getSafeRedirectTarget(redirectParam);
                window.location.href = safeRedirect || getDashboardForRole(user.role);
            } catch (error) {
                console.error("REGISTER ERROR:", error);
                console.error("REGISTER RESPONSE:", error?.response?.data);
                errorText.textContent =
                    error?.response?.data?.message ||
                    error?.payload?.message ||
                    error?.message ||
                    "Registration failed";
                errorText.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Register";
            }
        });

        onRoleChange();
    </script>
</body>
</html>
